<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Bem-vindo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Centraliza tudo na tela perfeitamente */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        /* Estilos do Título */
        .welcome-text {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6); /* Brilho roxo leve */
            margin-bottom: 20px;
        }

        /* Estilos do espaço da Logo */
        .logo-placeholder {
            max-width: 350px; /* Tamanho máximo da logo */
            height: auto;
            margin-bottom: 40px;
            /* Estilo temporário caso a imagem não carregue: */
            min-height: 150px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilos dos Botões Roxos */
        .btn-purple { 
            background-color: #a855f7; 
            color: white; 
            border: none; 
            font-weight: bold; 
            transition: 0.3s;
            width: 150px;
        }
        .btn-purple:hover { background-color: #9333ea; color: white; transform: scale(1.05); }
        
        .btn-outline-purple { 
            color: #a855f7; 
            border-color: #a855f7; 
            background: transparent; 
            font-weight: bold; 
            transition: 0.3s;
            width: 150px;
        }
        .btn-outline-purple:hover { background-color: #a855f7; color: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1 class="welcome-text">SEJAM BEM VINDOS A PACTOS RPG</h1>
    
    <img src="https://ibb.co/N6Ly9cxj" alt="Logo PACTOS RPG" class="logo-placeholder">

    <div class="d-flex gap-4">
        <a href="login.html" class="btn btn-purple btn-lg">Entrar</a>
        <a href="register.html" class="btn btn-outline-purple btn-lg">Registrar-se</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

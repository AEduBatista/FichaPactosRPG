<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACTOS RPG - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;
        }
        .auth-card {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #333;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .auth-title { color: #ffffff; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); text-align: center; margin-bottom: 30px; font-weight: bold; }
        .form-control:focus { border-color: #a855f7; box-shadow: 0 0 5px rgba(168, 85, 247, 0.5); background-color: #2b2b2b; color: white; }
        .btn-purple { background-color: #a855f7; color: white; border: none; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-purple:hover { background-color: #9333ea; color: white; transform: scale(1.02); }
        .auth-links { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .auth-links a { color: #a855f7; text-decoration: none; transition: 0.2s; }
        .auth-links a:hover { color: #d8b4fe; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 class="auth-title">ENTRAR</h2>

        <form onsubmit="entrarNoSistema(event)">
            <div class="mb-3">
                <label class="form-label text-muted">Usuário</label>
                <input type="text" id="nomeUsuarioLogin" class="form-control bg-dark text-light border-secondary" placeholder="Seu nome de usuário" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted">Senha</label>
                <input type="password" id="senhaLogin" class="form-control bg-dark text-light border-secondary" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-purple btn-lg">Acessar Sistema</button>
        </form>

        <div class="auth-links">
            <span>Ainda não tem um pacto?</span> <a href="register.html">Registre-se aqui</a>
        </div>
    </div>

    <script>
        async function entrarNoSistema(event) {
            event.preventDefault(); // Impede a página de recarregar

            const nome = document.getElementById('nomeUsuarioLogin').value;
            const senha = document.getElementById('senhaLogin').value;

            // Monta o "pacote" para enviar ao Java
            const dadosLogin = {
                nomeUsuario: nome,
                senha: senha
            };

            try {
                const resposta = await fetch('/api/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosLogin)
                });

                const textoRetorno = await resposta.text();

                if (resposta.ok) {
                    // Se o Java retornou ResponseEntity.ok
                    // AQUI É O PULO DO GATO: Salvamos o nome do jogador no navegador para usarmos depois!
                    localStorage.setItem('usuarioLogado', nome);

                    window.location.href = "fichas.html"; // Redireciona para o painel de agentes
                } else {
                    // Se o Java retornou UNAUTHORIZED
                    alert(textoRetorno);
                }
            } catch (erro) {
                console.error(erro);
                alert("O servidor do PACTOS está offline.");
            }
        }
    </script>

</body>
</html>
